<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Reminders"/>
<meta name="theme-color" content="#f8fafc"/>
<title>HA Reminders</title>
<style>
:root{
  --bg:#f1f5f9;--sf:#fff;--sf2:#f8fafc;--sf3:#e2e8f0;
  --ac:#3b82f6;--acd:#2563eb;
  --red:#ef4444;--grn:#16a34a;--amb:#d97706;
  --tx:#1e293b;--tx2:#64748b;--bd:rgba(0,0,0,.08);
  --r:14px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100vh;}

#hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:max(18px,env(safe-area-inset-top)) 20px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
#hdr h1{font-size:17px;font-weight:600;flex:1;}
.hbtn{background:none;border:none;color:var(--tx2);cursor:pointer;padding:6px;border-radius:8px;display:flex;transition:background .15s;}
.hbtn:hover{background:var(--sf2);}

#view{flex:1;overflow-y:auto;padding:14px 14px calc(76px + env(safe-area-inset-bottom));}

#nav{background:var(--sf);border-top:1px solid var(--bd);display:flex;position:sticky;bottom:0;padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;padding:9px 0 10px;background:none;border:none;color:var(--tx2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-family:inherit;transition:color .15s;}
.tab.on{color:var(--ac);}
.tab svg{width:22px;height:22px;}

/* Filters */
.filters{margin-bottom:14px;display:flex;flex-direction:column;gap:7px;}
.filter-row{display:flex;align-items:center;gap:8px;}
.filter-lbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;min-width:34px;}
.pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .15s;font-family:inherit;}
.pill.on{background:var(--ac);border-color:var(--ac);color:#fff;}
.pill:hover:not(.on){border-color:var(--ac);color:var(--ac);}

/* Cards */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:15px 16px 13px;margin-bottom:10px;}
.card.sent{border-color:rgba(124,58,237,.2);background:#fdf8ff;}
.r-time{font-size:12px;color:var(--tx2);margin-bottom:6px;display:flex;align-items:center;gap:5px;font-weight:500;}
.r-time.late{color:var(--red);}
.r-time.sent-time{color:#7c3aed;}
.r-recur{font-size:11px;color:var(--tx2);margin-bottom:7px;display:flex;align-items:center;gap:4px;opacity:.75;}
.r-msg{font-size:15px;line-height:1.55;margin-bottom:12px;word-break:break-word;}
.r-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.r-foot-del{margin-left:auto;}

/* Badges */
.badge{font-size:12px;font-weight:500;border-radius:20px;padding:3px 10px;display:inline-block;border:1px solid transparent;}
.badge-michael{background:#fff7ed;color:#c2410c;border-color:#fed7aa;}
.badge-krista{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;}
.badge-both{background:#f0fdf4;color:#15803d;border-color:#bbf7d0;}
.badge-from{background:var(--sf2);color:var(--tx2);border-color:var(--sf3);font-size:11px;}
.badge-gib{background:#faf5ff;color:#7c3aed;border-color:#ddd6fe;font-size:11px;}

.del{background:none;border:none;color:var(--tx2);cursor:pointer;padding:5px;display:flex;border-radius:7px;transition:color .15s,background .15s;opacity:.55;}
.del:hover{opacity:1;color:var(--red);background:#fef2f2;}

/* Add button */
.add-btn{width:100%;padding:9px 14px;background:none;border:1px dashed var(--sf3);border-radius:20px;color:var(--tx2);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:border-color .15s,color .15s;margin-top:4px;}
.add-btn:hover{border-color:var(--ac);color:var(--ac);}
.add-btn svg{width:14px;height:14px;}

/* Form */
.fg{margin-bottom:16px;}
label{display:block;font-size:13px;color:var(--tx2);font-weight:500;margin-bottom:7px;}
input,select,textarea{width:100%;background:var(--sf2);border:1.5px solid var(--sf3);border-radius:var(--r-sm);padding:12px 13px;color:var(--tx);font-size:15px;outline:none;font-family:inherit;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--ac);background:var(--sf);}
textarea{resize:vertical;min-height:90px;line-height:1.5;}
.counter{text-align:right;font-size:12px;color:var(--tx2);margin-top:5px;}
.counter.warn{color:var(--amb);}
.counter.over{color:var(--red);}
input[type=datetime-local]::-webkit-calendar-picker-indicator,
input[type=date]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.45;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

/* Toggle */
.toggle-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.toggle-text .toggle-label{font-size:15px;color:var(--tx);font-weight:500;}
.toggle-text .toggle-sub{font-size:12px;color:var(--tx2);margin-top:3px;}
.toggle-wrap{flex-shrink:0;position:relative;width:44px;height:26px;cursor:pointer;display:block;}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute;}
.toggle-pill{position:absolute;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:26px;transition:.2s;}
.toggle-pill::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
input:checked ~ .toggle-pill{background:#7c3aed;}
input:checked ~ .toggle-pill::before{transform:translateX(18px);}

/* Recur preview */
.recur-preview{background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:500;border-radius:20px;padding:5px 12px;margin-top:8px;display:inline-block;border:1px solid #bfdbfe;}

.divider{border:none;border-top:1px solid var(--bd);margin:4px 0 16px;}
.btn{width:100%;padding:14px;border-radius:var(--r-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-p{background:var(--ac);color:#fff;}
.btn-p:hover:not(:disabled){background:var(--acd);}
.btn-p:disabled{opacity:.4;cursor:default;}

.empty{text-align:center;padding:48px 24px;color:var(--tx2);}
.empty svg{width:42px;height:42px;opacity:.2;display:block;margin:0 auto 12px;}
.empty p{font-size:15px;margin-bottom:6px;color:var(--tx);}
.empty small{font-size:14px;}
.loader{text-align:center;padding:44px;color:var(--tx2);font-size:14px;}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r-sm);padding:13px;font-size:14px;color:var(--red);margin-bottom:12px;line-height:1.5;}
.inf{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r-sm);padding:13px;font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:16px;}
.inf strong{color:var(--tx);}
.inf code{background:var(--sf3);padding:2px 5px;border-radius:4px;font-size:12px;color:var(--ac);font-family:monospace;}

#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:82px;border-radius:20px;padding:10px 18px;font-size:13px;font-weight:500;z-index:200;max-width:290px;text-align:center;pointer-events:none;transition:opacity .25s,transform .25s;opacity:0;white-space:nowrap;color:#fff;}
#toast.ok{background:#15803d;}
#toast.bad{background:var(--red);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
</style>
</head>
<body>
<div id="hdr">
  <h1 id="htitle">Reminders</h1>
  <button class="hbtn" id="rbtn" onclick="loadList()" title="Refresh" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>
</div>
<div id="view"></div>
<div id="toast" role="status" aria-live="polite"></div>
<nav id="nav">
  <button class="tab on" id="tab-list" onclick="go('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="13" y2="15"/>
    </svg>Reminders
  </button>
  <button class="tab" id="tab-new" onclick="go('new')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>New
  </button>
  <button class="tab" id="tab-settings" onclick="go('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>Settings
  </button>
</nav>
<script>
// ── CONFIG ──────────────────────────────────────────────────────
const TODO='todo.reminders', MAX=255;
const USER_IDS={
  'a305c50612f94a95a8381734144905e6':'michael',
  '5e30e3fe0c8f4bfba27c2bbc9f617581':'krista'
};
const TARGETS={
  michael:{label:'Michael',cls:'badge-michael'},
  krista:{label:'Krista',cls:'badge-krista'},
  both:{label:'Both',cls:'badge-both'}
};
const RECURS=[
  {v:'once',l:'One-time'},
  {v:'daily',l:'Daily'},
  {v:'weekdays',l:'Weekdays (Mon\u2013Fri)'},
  {v:'weekends',l:'Weekends (Sat & Sun)'},
  {v:'weekly',l:'Weekly'},
  {v:'biweekly',l:'Every 2 weeks'},
  {v:'monthly_date',l:'Monthly \u2014 same date'},
  {v:'monthly_weekday',l:'Monthly \u2014 same weekday'},
];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const WEEKS=['1st','2nd','3rd','4th'];

// ── STATE ───────────────────────────────────────────────────────
let view='list',_items=[],haUrl='',haTok='',haUser='';
let filterTarget='all',filterCreator='all';
try{
  haUrl=localStorage.getItem('har_url')||'';
  haTok=localStorage.getItem('har_tok')||'';
  haUser=localStorage.getItem('har_user')||'';
}catch(_){}

// ── WEBSOCKET ───────────────────────────────────────────────────
function wsUrl(){return haUrl.replace(/^https/,'wss').replace(/^http/,'ws').replace(/\/$/,'')+'/api/websocket';}

function wsConnect(handler){
  return new Promise(function(resolve,reject){
    if(!haUrl||!haTok){reject(new Error('Not connected'));return;}
    var ws,done=false,tid=setTimeout(function(){done=true;try{ws&&ws.close();}catch(_){}reject(new Error('Timed out'));},10000);
    try{ws=new WebSocket(wsUrl());}catch(e){clearTimeout(tid);reject(new Error('Invalid URL'));return;}
    ws.onmessage=function(ev){
      if(done)return;
      var m;try{m=JSON.parse(ev.data);}catch(_){return;}
      if(m.type==='auth_required'){
        ws.send(JSON.stringify({type:'auth',access_token:haTok}));
      }else if(m.type==='auth_invalid'){
        done=true;clearTimeout(tid);ws.close();reject(new Error('Invalid token'));
      }else{
        var result=handler(m,ws);
        if(result&&result.done){done=true;clearTimeout(tid);ws.close();resolve(result.value);}
        else if(result&&result.err){done=true;clearTimeout(tid);ws.close();reject(new Error(result.err));}
      }
    };
    ws.onerror=function(){if(done)return;done=true;clearTimeout(tid);reject(new Error('WebSocket failed'));};
    ws.onclose=function(e){if(done)return;done=true;clearTimeout(tid);if(!e.wasClean)reject(new Error('Connection dropped'));};
  });
}

async function getItems(){
  return wsConnect(function(m,ws){
    if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:1,type:'call_service',domain:'todo',service:'get_items',service_data:{status:'needs_action'},target:{entity_id:TODO},return_response:true}));
    }else if(m.type==='result'&&m.id===1){
      if(m.success)return{done:true,value:(m.result&&m.result.response&&m.result.response[TODO]&&m.result.response[TODO].items)||[]};
      return{err:(m.error&&m.error.message)||'Failed to get items'};
    }
  });
}

async function getCurrentUser(){
  return wsConnect(function(m,ws){
    if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:1,type:'auth/current_user'}));
    }else if(m.type==='result'&&m.id===1){
      if(m.success)return{done:true,value:m.result};
      return{err:'Could not get user'};
    }
  });
}

// ── REST ────────────────────────────────────────────────────────
async function apiPost(path,body){
  if(!haUrl||!haTok)throw new Error('Not connected — configure Settings first.');
  const r=await fetch(haUrl.replace(/\/$/,'')+path,{
    method:'POST',
    headers:{Authorization:'Bearer '+haTok,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error('HA '+r.status+': '+(await r.text()).slice(0,120));
  return r.json();
}
async function addItem(summary,dtLocal,desc){
  await apiPost('/api/services/todo/add_item',{entity_id:TODO,item:summary,due_datetime:new Date(dtLocal).toISOString(),description:desc});
}
async function removeItem(uid){
  await apiPost('/api/services/todo/remove_item',{entity_id:TODO,item:uid});}

// ── UTILS ───────────────────────────────────────────────────────
const esc=s=>{const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;};
function ordinal(n){if(n>=11&&n<=13)return 'th';const s=n%10;return s===1?'st':s===2?'nd':s===3?'rd':'th';}

function fmtDt(iso){
  if(!iso)return '--';
  const d=new Date(iso),now=new Date();
  const same=(a,b)=>a.toDateString()===b.toDateString();
  const t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(same(d,now))return 'Today \u00b7 '+t;
  if(same(d,new Date(now.getTime()+864e5)))return 'Tomorrow \u00b7 '+t;
  return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})+' \u00b7 '+t;
}

function dfltDt(){
  const d=new Date();
  d.setMinutes(Math.ceil(d.getMinutes()/10)*10,0,0);
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());
}

function parseDesc(raw){
  try{return JSON.parse(raw);}catch(_){return{t:'michael',r:'once'};}
}

function buildDesc(tgt,r,dtVal,endsType,endsVal,ack){
  const d=new Date(dtVal);
  const dow=(d.getDay()+6)%7;
  const dom=d.getDate();
  const wn=Math.min(Math.ceil(dom/7),4);
  const obj={t:tgt,r:r,c:haUser||'unknown',fc:0};
  if(r!=='once'){
    if(['weekly','biweekly','monthly_weekday'].indexOf(r)>=0)obj.day=dow;
    if(r==='monthly_date')obj.day=dom;
    if(r==='monthly_weekday')obj.week=wn;
    if(endsType==='count'&&endsVal)obj.mc=parseInt(endsVal)||2;
    if(endsType==='date'&&endsVal)obj.end=endsVal;
  }
  if(ack&&tgt!==haUser)obj.ack=1;
  return JSON.stringify(obj);
}

function fmtRecur(parsed){
  const r=parsed.r;if(!r||r==='once')return null;
  const day=parsed.day||0,week=parsed.week||1;
  const label={
    daily:'Daily',weekdays:'Weekdays',weekends:'Weekends',
    weekly:'Weekly \u00b7 '+DAYS[day],biweekly:'Every 2 weeks \u00b7 '+DAYS[day],
    monthly_date:'Monthly \u00b7 '+day+ordinal(day),
    monthly_weekday:'Monthly \u00b7 '+WEEKS[week-1]+' '+DAYS[day],
  }[r]||r;
  const mc=parsed.mc||0,fc=parsed.fc||0;
  if(mc>0&&mc-fc>0)return label+' \u00b7 '+(mc-fc)+' left';
  if(parsed.end)return label+' \u00b7 until '+new Date(parsed.end).toLocaleDateString([],{month:'short',day:'numeric'});
  return label;
}

function recurPreview(r,dtVal){
  if(r==='once'||!dtVal)return '';
  const d=new Date(dtVal),dow=(d.getDay()+6)%7,dom=d.getDate(),wn=Math.min(Math.ceil(dom/7),4);
  return{
    daily:'Fires every day at this time',weekdays:'Fires Mon\u2013Fri at this time',weekends:'Fires Sat & Sun at this time',
    weekly:'Fires every '+DAYS[dow]+' at this time',biweekly:'Fires every other '+DAYS[dow]+' at this time',
    monthly_date:'Fires on the '+dom+ordinal(dom)+' of each month',
    monthly_weekday:'Fires on the '+WEEKS[wn-1]+' '+DAYS[dow]+' of each month',
  }[r]||'';
}

let _tt;
function toast(msg,ok){
  if(ok===undefined)ok=true;
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=ok?'ok':'bad';
  void el.offsetWidth;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},2700);
}

// ── NAVIGATION ──────────────────────────────────────────────────
const TITLES={list:'Reminders',new:'New Reminder',settings:'Settings'};
function go(v){
  view=v;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  const el=document.getElementById('tab-'+v);if(el)el.classList.add('on');
  document.getElementById('htitle').textContent=TITLES[v]||'';
  document.getElementById('rbtn').style.display=v==='list'?'':'none';
  render();
}
function render(){
  if(view==='list')renderList();
  else if(view==='new')renderNew();
  else renderSettings();
}

// ── FILTERS ─────────────────────────────────────────────────────
function setFilter(type,val){
  if(type==='target')filterTarget=val;
  else filterCreator=val;
  renderCards();
}
function applyFilters(items){
  return items.filter(function(item){
    const p=parseDesc(item.description);
    const t=p.t||'michael',c=p.c||t;
    return(filterTarget==='all'||t===filterTarget)&&(filterCreator==='all'||c===filterCreator);
  });
}
function filterPills(type,vals,current){
  return vals.map(function(v){
    const lbl=v==='all'?'All':(TARGETS[v]?TARGETS[v].label:v);
    return '<button class="pill'+(current===v?' on':'')+'" onclick="setFilter(\''+type+'\',\''+v+'\')">'+lbl+'</button>';
  }).join('');
}

// ── LIST ────────────────────────────────────────────────────────
async function renderList(){
  const v=document.getElementById('view');
  if(!haUrl||!haTok){
    v.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><p>Not connected</p><small>Open Settings to connect to Home Assistant.</small></div>';
    return;
  }
  v.innerHTML='<div class="loader">Loading...</div>';
  try{
    _items=await getItems();
    _items.sort(function(a,b){return new Date(a.due||0)-new Date(b.due||0);});
    renderCards();
  }catch(e){
    v.innerHTML='<div class="err">&#9888; '+esc(e.message)+'</div>';
  }
}

function renderCards(){
  const v=document.getElementById('view');
  if(!v)return;
  const shown=applyFilters(_items);
  var html='<div class="filters">'+
    '<div class="filter-row"><span class="filter-lbl">To</span><div class="pills">'+filterPills('target',['all','michael','krista','both'],filterTarget)+'</div></div>'+
    '<div class="filter-row"><span class="filter-lbl">From</span><div class="pills">'+filterPills('creator',['all','michael','krista'],filterCreator)+'</div></div>'+
    '</div>';
  if(!shown.length){
    html+='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>'+
      '<p>'+(filterTarget==='all'&&filterCreator==='all'?'All clear':'No matches')+'</p>'+
      '<small>'+(filterTarget==='all'&&filterCreator==='all'?'No pending reminders.':'Try adjusting the filters.')+'</small></div>';
  }else{
    html+=shown.map(function(r,i){
      const due=r.due||'';
      const p=parseDesc(r.description);
      const t=p.t||'michael',c=p.c||t;
      const late=due&&new Date(due)<new Date();
      const isSent=!!p.sent_at;
      const showFrom=c!==t;
      const showGib=p.ack===1&&c!==t;
      const tgt=TARGETS[t]||TARGETS.michael;
      const fromTgt=TARGETS[c];
      const recurStr=fmtRecur(p);
      const globalIdx=_items.indexOf(r);
      return '<div class="card'+(isSent?' sent':'')+'">'+
        '<div class="r-time '+(isSent?'sent-time':late?'late':'')+'">'+
        (isSent?
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Sent '+esc(fmtDt(p.sent_at)):
          (late?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>':
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>')+
          esc(fmtDt(due))+(late?' \u2014 Overdue':'')
        )+
        '</div>'+
        (recurStr?'<div class="r-recur"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>'+esc(recurStr)+'</div>':'')+
        '<div class="r-msg">'+esc(r.summary||'')+'</div>'+
        '<div class="r-foot">'+
        '<span class="badge '+tgt.cls+'">'+tgt.label+'</span>'+
        (showFrom&&fromTgt?'<span class="badge badge-from">from '+fromTgt.label+'</span>':'')+
        (showGib?'<span class="badge badge-gib">Gib Response</span>':'')+
        '<button class="del r-foot-del" onclick="handleDel('+globalIdx+')" aria-label="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>'+
        '</div></div>';
    }).join('');
  }
  html+='<button class="add-btn" onclick="go(\'new\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add reminder</button>';
  v.innerHTML=html;
}

// ── NEW ─────────────────────────────────────────────────────────
function renderNew(){
  const recurOpts=RECURS.map(function(o){return '<option value="'+o.v+'">'+o.l+'</option>';}).join('');
  const tgtOpts=Object.entries(TARGETS).map(function(e){return '<option value="'+e[0]+'">'+e[1].label+'</option>';}).join('');
  document.getElementById('view').innerHTML=
    '<div class="fg"><label for="fi-msg">Message <span style="font-weight:400;opacity:.6">(max '+MAX+' chars)</span></label>'+
    '<textarea id="fi-msg" placeholder="Remind me to..." oninput="updCnt()"></textarea>'+
    '<div class="counter" id="fi-cnt">0 / '+MAX+'</div></div>'+
    '<div class="fg"><label for="fi-dt">Date &amp; Time</label>'+
    '<input type="datetime-local" id="fi-dt" value="'+dfltDt()+'" step="600" onchange="updRecurPreview()"/></div>'+
    '<div class="fg"><label for="fi-tgt">Send To</label>'+
    '<select id="fi-tgt" onchange="onTargetChange()">'+tgtOpts+'</select></div>'+
    '<hr class="divider"/>'+
    '<div class="fg"><label for="fi-recur">Repeats</label>'+
    '<select id="fi-recur" onchange="onRecurChange()">'+recurOpts+'</select>'+
    '<div id="fi-recur-preview"></div></div>'+
    '<div id="fi-ends-section" style="display:none">'+
      '<div class="fg"><label for="fi-ends">Ends</label>'+
      '<select id="fi-ends" onchange="onEndsChange()">'+
        '<option value="never">Never</option>'+
        '<option value="count">After N reminders</option>'+
        '<option value="date">On a date</option>'+
      '</select></div>'+
      '<div id="fi-ends-count" class="fg" style="display:none"><label for="fi-endcount">Number of reminders</label><input type="number" id="fi-endcount" min="2" max="999" value="10"/></div>'+
      '<div id="fi-ends-date" class="fg" style="display:none"><label for="fi-enddate">End date</label><input type="date" id="fi-enddate"/></div>'+
    '</div>'+
    '<hr class="divider"/>'+
    '<div id="fi-gib-section" class="fg" style="display:none">'+
      '<div class="toggle-row">'+
        '<div class="toggle-text"><div class="toggle-label">Gib Response</div><div class="toggle-sub">Notifies you when they acknowledge</div></div>'+
        '<label class="toggle-wrap"><input type="checkbox" id="fi-ack"/><span class="toggle-pill"></span></label>'+
      '</div>'+
    '</div>'+
    '<button class="btn btn-p" id="fi-btn" onclick="handleCreate()">Schedule Reminder</button>';
  onTargetChange();
}

function onTargetChange(){
  const tgt=document.getElementById('fi-tgt');
  const gibSec=document.getElementById('fi-gib-section');
  if(!tgt||!gibSec)return;
  // Show Gib Response toggle only when target != current user
  const show=haUser&&tgt.value!==haUser;
  gibSec.style.display=show?'':'none';
}

function onRecurChange(){
  const r=document.getElementById('fi-recur');
  const ends=document.getElementById('fi-ends-section');
  if(ends)ends.style.display=r&&r.value!=='once'?'':'none';
  updRecurPreview();
}

function onEndsChange(){
  const t=document.getElementById('fi-ends')?document.getElementById('fi-ends').value:'never';
  const ec=document.getElementById('fi-ends-count'),ed=document.getElementById('fi-ends-date');
  if(ec)ec.style.display=t==='count'?'':'none';
  if(ed)ed.style.display=t==='date'?'':'none';
}

function updRecurPreview(){
  const pr=document.getElementById('fi-recur-preview');
  const r=document.getElementById('fi-recur');
  const dt=document.getElementById('fi-dt');
  if(!pr||!r||!dt)return;
  const text=recurPreview(r.value,dt.value);
  pr.innerHTML=text?'<span class="recur-preview">'+esc(text)+'</span>':'';
}

function updCnt(){
  const ta=document.getElementById('fi-msg'),ct=document.getElementById('fi-cnt');
  if(!ta||!ct)return;
  const n=ta.value.length;
  ct.textContent=n+' / '+MAX;
  ct.className='counter'+(n>=MAX?' over':n>=MAX*.85?' warn':'');
}

// ── SETTINGS ────────────────────────────────────────────────────
function renderSettings(){
  document.getElementById('view').innerHTML=
    '<div class="inf">Enter your HA URL and a <strong>Long-Lived Access Token</strong>. '+
    'Your identity is auto-detected from the token — override below if needed.<br><br>'+
    'Profile &rarr; Security &rarr; Long-Lived Access Tokens &rarr; Create token.</div>'+
    '<div class="fg"><label for="si-url">Home Assistant URL</label>'+
    '<input type="url" id="si-url" placeholder="https://xxxx.ui.nabu.casa" value="'+esc(haUrl)+'" autocapitalize="none" autocorrect="off"/></div>'+
    '<div class="fg"><label for="si-tok">Access Token</label>'+
    '<input type="password" id="si-tok" placeholder="eyJ..." value="'+esc(haTok)+'" autocomplete="off"/></div>'+
    '<div class="fg"><label for="si-me">I am</label>'+
    '<select id="si-me">'+
      '<option value="">Unknown</option>'+
      Object.entries(TARGETS).filter(function(e){return e[0]!=='both';}).map(function(e){
        return '<option value="'+e[0]+'"'+(haUser===e[0]?' selected':'')+'>'+e[1].label+'</option>';
      }).join('')+
    '</select></div>'+
    '<button class="btn btn-p" id="si-btn" onclick="handleSave()">Save &amp; Connect</button>'+
    '<div class="inf" style="margin-top:18px"><strong>Required in Home Assistant</strong><br>'+
    'Local To-do list: <code>todo.reminders</code><br>'+
    'Delivery automation + Action handler<br>Requires HA 2023.11+</div>';
}

// ── HANDLERS ────────────────────────────────────────────────────
async function handleCreate(){
  const msg=(document.getElementById('fi-msg')?document.getElementById('fi-msg').value:'').trim();
  const dt=document.getElementById('fi-dt')?document.getElementById('fi-dt').value:'';
  const tgt=document.getElementById('fi-tgt')?document.getElementById('fi-tgt').value:'michael';
  const r=document.getElementById('fi-recur')?document.getElementById('fi-recur').value:'once';
  const endsEl=document.getElementById('fi-ends');
  const endsType=endsEl?endsEl.value:'never';
  const endsCountEl=document.getElementById('fi-endcount');
  const endsDateEl=document.getElementById('fi-enddate');
  const endsVal=endsType==='count'?(endsCountEl?endsCountEl.value:''):endsType==='date'?(endsDateEl?endsDateEl.value:''):'';
  const ackEl=document.getElementById('fi-ack');
  const ack=ackEl?ackEl.checked:false;
  const btn=document.getElementById('fi-btn');
  if(!msg){toast('Message cannot be empty.',false);return;}
  if(msg.length>MAX){toast('Message too long (max '+MAX+' chars).',false);return;}
  if(!dt){toast('Please pick a date and time.',false);return;}
  if(new Date(dt)<=new Date()){toast('Please pick a future time.',false);return;}
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try{
    const desc=buildDesc(tgt,r,dt,endsType,endsVal,ack);
    await addItem(msg,dt,desc);
    toast('Reminder scheduled');go('list');
  }catch(e){
    toast(e.message,false);
    if(btn){btn.disabled=false;btn.textContent='Schedule Reminder';}
  }
}

async function handleDel(idx){
  const uid=_items[idx]&&_items[idx].uid;
  if(!uid)return;
  if(!confirm('Delete this reminder?'))return;
  try{await removeItem(uid);toast('Deleted.');renderList();}
  catch(e){toast(e.message,false);}
}

async function handleSave(){
  const url=(document.getElementById('si-url')?document.getElementById('si-url').value:'').trim();
  const tok=(document.getElementById('si-tok')?document.getElementById('si-tok').value:'').trim();
  const me=document.getElementById('si-me')?document.getElementById('si-me').value:'';
  if(!url||!tok){toast('Both URL and token are required.',false);return;}
  const btn=document.getElementById('si-btn');
  if(btn){btn.disabled=true;btn.textContent='Connecting...';}
  haUrl=url;haTok=tok;
  try{localStorage.setItem('har_url',url);localStorage.setItem('har_tok',tok);}catch(_){}
  try{
    const user=await getCurrentUser();
    const mapped=USER_IDS[user.id]||(user.name?user.name.toLowerCase().split(' ')[0]:'');
    haUser=mapped||me||'';
    try{localStorage.setItem('har_user',haUser);}catch(_){}
    toast('Connected as '+(TARGETS[haUser]?TARGETS[haUser].label:(user.name||'Unknown')));
    setTimeout(function(){go('list');},700);
  }catch(e){
    // Auto-detect failed; use manual selection
    haUser=me||'';
    try{localStorage.setItem('har_user',haUser);}catch(_){}
    toast(haUser?'Saved as '+(TARGETS[haUser]?TARGETS[haUser].label:haUser):'Saved — set your name above',!!(haUser));
    setTimeout(function(){go('list');},900);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Save & Connect';}
  }
}

async function loadList(){if(view==='list')await renderList();}
