<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Reminders"/>
<meta name="theme-color" content="#0f172a"/>
<title>HA Reminders</title>
<style>
:root{
  --bg:#0f172a;--sf:#1e293b;--sf2:#334155;--sf3:#475569;
  --ac:#3b82f6;--acd:#1d4ed8;
  --red:#ef4444;--grn:#22c55e;--amb:#f59e0b;
  --tx:#f1f5f9;--mu:#94a3b8;--bd:#334155;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:600px;}
#hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:max(16px,env(safe-area-inset-top)) 20px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
#hdr h1{font-size:17px;font-weight:600;flex:1;letter-spacing:-.01em;}
.hbtn{background:none;border:none;color:var(--mu);cursor:pointer;padding:5px;border-radius:6px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.hbtn:hover{color:var(--tx);background:var(--sf2);}
#view{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(70px + env(safe-area-inset-bottom));}
#nav{background:var(--sf);border-top:1px solid var(--bd);display:flex;position:sticky;bottom:0;padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;padding:9px 0 10px;background:none;border:none;color:var(--mu);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-family:inherit;transition:color .15s;}
.tab.on{color:var(--ac);}
.tab svg{width:21px;height:21px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:13px 14px;margin-bottom:10px;}
.r-time{font-size:12px;color:var(--mu);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.r-time.late{color:var(--red);}
.r-msg{font-size:15px;line-height:1.5;margin-bottom:9px;word-break:break-word;}
.r-foot{display:flex;align-items:center;justify-content:space-between;}
.badge{font-size:11px;background:var(--sf2);border-radius:20px;padding:3px 9px;color:var(--mu);}
.del{background:none;border:none;color:var(--red);opacity:.6;cursor:pointer;padding:4px;display:flex;border-radius:5px;transition:opacity .15s,background .15s;}
.del:hover{opacity:1;background:rgba(239,68,68,.1);}
.fg{margin-bottom:16px;}
label{display:block;font-size:13px;color:var(--mu);font-weight:500;margin-bottom:6px;}
input,select,textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:11px 12px;color:var(--tx);font-size:15px;outline:none;font-family:inherit;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--ac);}
textarea{resize:vertical;min-height:88px;}
.counter{text-align:right;font-size:11px;color:var(--mu);margin-top:4px;}
.counter.warn{color:var(--amb);}
.counter.over{color:var(--red);}
input[type=datetime-local]::-webkit-calendar-picker-indicator{filter:invert(.55) hue-rotate(180deg) brightness(1.2);}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-.01em;}
.btn-p{background:var(--ac);color:#fff;}
.btn-p:hover:not(:disabled){background:var(--acd);}
.btn-p:disabled{opacity:.4;cursor:default;}
.empty{text-align:center;padding:50px 20px;color:var(--mu);}
.empty svg{width:42px;height:42px;opacity:.3;display:block;margin:0 auto 12px;}
.empty p{font-size:15px;margin-bottom:6px;}
.empty small{font-size:13px;}
.loader{text-align:center;padding:40px;color:var(--mu);font-size:14px;}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:13px;font-size:13px;color:var(--red);margin-bottom:12px;}
.inf{background:var(--sf2);border-radius:10px;padding:13px;font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:15px;}
.inf strong{color:var(--tx);}
.inf code{background:var(--sf);padding:1px 5px;border-radius:4px;font-size:12px;color:#93c5fd;font-family:monospace;}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:70px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 16px;font-size:13px;z-index:200;max-width:280px;text-align:center;pointer-events:none;transition:opacity .3s,transform .3s;opacity:0;white-space:nowrap;}
#toast.ok{border-color:rgba(34,197,94,.4);color:var(--grn);}
#toast.bad{border-color:rgba(239,68,68,.4);color:var(--red);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
</style>
</head>
<body>
<h2 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0;">Home Assistant Reminders App</h2>
<div id="hdr">
  <h1 id="htitle">&#9200; Reminders</h1>
  <button class="hbtn" id="rbtn" onclick="loadList()" title="Refresh" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>
</div>
<div id="view"></div>
<div id="toast" role="status" aria-live="polite"></div>
<nav id="nav" aria-label="Main navigation">
  <button class="tab on" id="tab-list" onclick="go('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="13" y2="15"/>
    </svg>
    Reminders
  </button>
  <button class="tab" id="tab-new" onclick="go('new')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="16"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    New
  </button>
  <button class="tab" id="tab-settings" onclick="go('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
    Settings
  </button>
</nav>
<script>
const TODO='todo.reminders', MAX=255;
const TARGETS={
  michael:{label:'Michael',svc:'notify.mobile_app_pixel_8'},
  krista:{label:'Krista',svc:'notify.mobile_app_pixel_8_krista'},
  both:{label:'Both',svc:'notify.alldevices'}
};
let view='list', _items=[], haUrl='', haTok='';
try{haUrl=localStorage.getItem('har_url')||'';haTok=localStorage.getItem('har_tok')||'';}catch(_){}

async function api(path,body){
  if(!haUrl||!haTok)throw new Error('Not connected — configure Settings first.');
  const r=await fetch(haUrl.replace(/\/$/,'')+path,{
    method:'POST',
    headers:{Authorization:'Bearer '+haTok,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error('HA '+r.status+': '+(await r.text()).slice(0,120));
  return r.json();
}

async function getItems(){
  const d=await api('/api/services/todo/get_items?return_response=true',{entity_id:TODO,status:'needs_action'});
  return d&&d[TODO]&&d[TODO].items?d[TODO].items:[];
}
async function addItem(msg,dtLocal,tgt){
  await api('/api/services/todo/add_item',{entity_id:TODO,item:msg,due_datetime:new Date(dtLocal).toISOString(),description:tgt});
}
async function removeItem(uid){
  await api('/api/services/todo/remove_item',{entity_id:TODO,item:uid});
}

const esc=s=>{const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;};

function fmtDt(iso){
  if(!iso)return '--';
  const d=new Date(iso),now=new Date();
  const same=(a,b)=>a.toDateString()===b.toDateString();
  const t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(same(d,now))return 'Today at '+t;
  if(same(d,new Date(now.getTime()+864e5)))return 'Tomorrow at '+t;
  return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})+' at '+t;
}

function dfltDt(){
  const d=new Date(Date.now()+30*60000);d.setSeconds(0,0);
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());
}

let _tt;
function toast(msg,ok){
  if(ok===undefined)ok=true;
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=ok?'ok':'bad';
  el.style.display='block';
  void el.offsetWidth;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},2800);
}

const TITLES={list:'&#9200; Reminders',new:'&#10133; New Reminder',settings:'&#9881;&#65039; Settings'};

function go(v){
  view=v;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  var el=document.getElementById('tab-'+v);
  if(el)el.classList.add('on');
  document.getElementById('htitle').innerHTML=TITLES[v]||'';
  document.getElementById('rbtn').style.display=v==='list'?'':'none';
  render();
}

function render(){
  if(view==='list')renderList();
  else if(view==='new')renderNew();
  else renderSettings();
}

async function renderList(){
  const v=document.getElementById('view');
  if(!haUrl||!haTok){
    v.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><p>Not connected</p><small>Open <strong>Settings</strong> to connect to Home Assistant.</small></div>';
    return;
  }
  v.innerHTML='<div class="loader">Loading...</div>';
  try{
    _items=await getItems();
    _items.sort(function(a,b){return new Date(a.due||0)-new Date(b.due||0);});
    if(!_items.length){
      v.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg><p>No pending reminders</p><small>Tap <strong>New</strong> to schedule one.</small></div>';
      return;
    }
    v.innerHTML=_items.map(function(r,i){
      const due=r.due||'';
      const late=due&&new Date(due)<new Date();
      const tgt=TARGETS[r.description]||TARGETS.michael;
      return '<div class="card"><div class="r-time '+(late?'late':'')+'">'+
        (late?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>':'&#128336;')+
        esc(fmtDt(due))+(late?' - Overdue':'')+
        '</div><div class="r-msg">'+esc(r.summary||'')+'</div>'+
        '<div class="r-foot"><span class="badge">To: '+tgt.label+'</span>'+
        '<button class="del" onclick="handleDel('+i+')" aria-label="Delete reminder">'+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>'+
        '</button></div></div>';
    }).join('');
  }catch(e){
    v.innerHTML='<div class="err">Warning: '+esc(e.message)+'</div>';
  }
}

function renderNew(){
  document.getElementById('view').innerHTML=
    '<div class="fg"><label for="fi-msg">Message (max '+MAX+' chars)</label>'+
    '<textarea id="fi-msg" placeholder="Remind me to..." oninput="updCnt()"></textarea>'+
    '<div class="counter" id="fi-cnt" aria-live="polite">0 / '+MAX+'</div></div>'+
    '<div class="fg"><label for="fi-dt">Date and Time</label>'+
    '<input type="datetime-local" id="fi-dt" value="'+dfltDt()+'" /></div>'+
    '<div class="fg"><label for="fi-tgt">Send To</label><select id="fi-tgt">'+
    Object.entries(TARGETS).map(function(e){return '<option value="'+e[0]+'">'+e[1].label+'</option>';}).join('')+
    '</select></div>'+
    '<button class="btn btn-p" id="fi-btn" onclick="handleCreate()">Schedule Reminder</button>';
}

function updCnt(){
  const ta=document.getElementById('fi-msg');
  const ct=document.getElementById('fi-cnt');
  if(!ta||!ct)return;
  const n=ta.value.length;
  ct.textContent=n+' / '+MAX;
  ct.className='counter'+(n>=MAX?' over':n>=MAX*.85?' warn':'');
}

function renderSettings(){
  document.getElementById('view').innerHTML=
    '<div class="inf">Enter your HA URL and a <strong>Long-Lived Access Token</strong>.<br>'+
    'Profile &rarr; Security &rarr; Long-Lived Access Tokens &rarr; Create token.</div>'+
    '<div class="fg"><label for="si-url">Home Assistant URL</label>'+
    '<input type="url" id="si-url" placeholder="https://homeassistant.local:8123" value="'+esc(haUrl)+'" autocapitalize="none" autocorrect="off"/></div>'+
    '<div class="fg"><label for="si-tok">Access Token</label>'+
    '<input type="password" id="si-tok" placeholder="eyJ..." value="'+esc(haTok)+'" autocomplete="off" autocorrect="off"/></div>'+
    '<button class="btn btn-p" onclick="handleSave()">Save Settings</button>'+
    '<div class="inf" style="margin-top:18px"><strong>Required in Home Assistant</strong><br>'+
    'Local To-do list with entity ID <code>todo.reminders</code><br>'+
    'Delivery automation (see setup instructions)<br>'+
    'Requires HA 2023.11+</div>';
}

async function handleCreate(){
  const msg=(document.getElementById('fi-msg')?document.getElementById('fi-msg').value:'').trim();
  const dt=document.getElementById('fi-dt')?document.getElementById('fi-dt').value:'';
  const tgt=document.getElementById('fi-tgt')?document.getElementById('fi-tgt').value:'michael';
  const btn=document.getElementById('fi-btn');
  if(!msg){toast('Message cannot be empty.',false);return;}
  if(msg.length>MAX){toast('Message too long (max '+MAX+' chars).',false);return;}
  if(!dt){toast('Please pick a date and time.',false);return;}
  if(new Date(dt)<=new Date()){toast('Please pick a future time.',false);return;}
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try{
    await addItem(msg,dt,tgt);
    toast('Reminder scheduled');
    go('list');
  }catch(e){
    toast(e.message,false);
    if(btn){btn.disabled=false;btn.textContent='Schedule Reminder';}
  }
}

async function handleDel(idx){
  const uid=_items[idx]&&_items[idx].uid;
  if(!uid)return;
  if(!confirm('Delete this reminder?'))return;
  try{await removeItem(uid);toast('Deleted.');renderList();}
  catch(e){toast(e.message,false);}
}

function handleSave(){
  const url=(document.getElementById('si-url')?document.getElementById('si-url').value:'').trim();
  const tok=(document.getElementById('si-tok')?document.getElementById('si-tok').value:'').trim();
  if(!url||!tok){toast('Both fields are required.',false);return;}
  haUrl=url;haTok=tok;
  try{localStorage.setItem('har_url',url);localStorage.setItem('har_tok',tok);}catch(_){}
  toast('Saved');
  setTimeout(function(){go('list');},800);
}

async function loadList(){if(view==='list')await renderList();}

const mf={name:'HA Reminders',short_name:'Reminders',description:'Schedule Home Assistant notification reminders',start_url:'.',display:'standalone',background_color:'#0f172a',theme_color:'#0f172a',icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#1e293b"/><text y="78" x="10" font-size="74">&#9200;</text></svg>'),sizes:'any',type:'image/svg+xml',purpose:'any'}]};
const ml=document.createElement('link');ml.rel='manifest';
ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(mf));
document.head.appendChild(ml);

go('list');
</script>
</body>
</html>
